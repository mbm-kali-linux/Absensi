<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { padding: 20px; background: #f4f7f6; font-family: sans-serif; }
    .container { max-width: 800px; }
    .card { border-radius: 15px; border: none; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .btn-primary { background: #4e73df; }
  </style>
</head>
<body>
  <div class="container">
    <h3 class="text-center fw-bold mb-4">Sistem Laporan Pondok</h3>

    <div class="card p-4">
      <h5 class="fw-bold text-primary">📌 Input Absensi</h5>
      <hr>
      <input type="text" id="absNama" class="form-control mb-2" placeholder="Nama Lengkap Santri">
      <select id="absStatus" class="form-select mb-2">
        <option value="Izin">Izin</option>
        <option value="Sakit">Sakit</option>
        <option value="Alpha">Alpha</option>
      </select>
      <input type="text" id="absKet" class="form-control mb-3" placeholder="Keterangan (misal: Pulang kampung)">
      <button onclick="kirim('Absensi')" id="btnAbs" class="btn btn-primary w-100">Simpan Absensi</button>
    </div>

    <div class="card p-4">
      <h5 class="fw-bold text-danger">⚠️ Laporan Pelanggaran</h5>
      <hr>
      <input type="text" id="lapNama" class="form-control mb-2" placeholder="Nama Santri Melanggar">
      <input type="text" id="lapJenis" class="form-control mb-2" placeholder="Jenis Pelanggaran (misal: Kabur)">
      <textarea id="lapKet" class="form-control mb-3" placeholder="Keterangan Tambahan"></textarea>
      <button onclick="kirim('Laporan')" id="btnLap" class="btn btn-danger w-100">Kirim Laporan</button>
    </div>

    <div class="card p-4">
      <h5 class="fw-bold text-success">📊 Rekapitulasi Data</h5>
      <hr>
      <button onclick="muatRekap()" id="btnRekap" class="btn btn-success mb-3 w-100">Tampilkan / Refresh Rekap</button>
      <div class="table-responsive">
        <table class="table table-hover mt-2">
          <thead class="table-light">
            <tr><th>Nama</th><th>Izin</th><th>Sakit</th><th>Alpha</th><th>Laporan</th></tr>
          </thead>
          <tbody id="tabelRekap"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function kirim(jenis) {
      const btn = jenis === 'Absensi' ? document.getElementById('btnAbs') : document.getElementById('btnLap');
      const data = jenis === 'Absensi' ? {
        nama: document.getElementById('absNama').value,
        status: document.getElementById('absStatus').value,
        ket: document.getElementById('absKet').value
      } : {
        nama: document.getElementById('lapNama').value,
        pelanggaran: document.getElementById('lapJenis').value,
        ket: document.getElementById('lapKet').value
      };

      if (!data.nama) return alert("Isi nama dulu bos!");
      btn.disabled = true; btn.innerText = "Mengirim...";

      google.script.run.withSuccessHandler(res => {
        alert(res); btn.disabled = false; btn.innerText = "Simpan Data";
        if(res.includes("✅")) location.reload(); 
      }).simpanData(data, jenis);
    }

    function muatRekap() {
      const btn = document.getElementById('btnRekap');
      btn.innerText = "Loading..."; btn.disabled = true;
      
      google.script.run.withSuccessHandler(data => {
        const tbody = document.getElementById('tabelRekap');
        tbody.innerHTML = "";
        if (data.error) { alert("Error: " + data.error); }
        else {
          for (let n in data) {
            tbody.innerHTML += `<tr><td>${n}</td><td>${data[n].izin}</td><td>${data[n].sakit}</td><td>${data[n].alpha}</td><td class="text-danger"><b>${data[n].laporan}</b></td></tr>`;
          }
        }
        btn.innerText = "Refresh Rekap"; btn.disabled = false;
      }).ambilRekap();
    }
  </script>
</body>
</html>
